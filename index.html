<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Voice Agent</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:380px;
    background:#1e293b;
    border-radius:20px;
    padding:30px;
    text-align:center;
    box-shadow:0 20px 50px rgba(0,0,0,.4);
}

h1{
    margin-bottom:10px;
}

.status{
    color:#22c55e;
    margin-bottom:25px;
}

.orb{
    width:140px;
    height:140px;
    margin:auto;
    border-radius:50%;
    background:linear-gradient(135deg,#3b82f6,#8b5cf6);
    animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.08);}
100%{transform:scale(1);}
}

.wave{
    display:flex;
    justify-content:center;
    gap:5px;
    margin:30px 0;
    height:40px;
}

.bar{
    width:6px;
    background:#38bdf8;
    border-radius:20px;
    animation:wave 1s infinite ease-in-out;
}

.bar:nth-child(2){animation-delay:.1s;}
.bar:nth-child(3){animation-delay:.2s;}
.bar:nth-child(4){animation-delay:.3s;}
.bar:nth-child(5){animation-delay:.4s;}

@keyframes wave{
0%,100%{height:10px;}
50%{height:40px;}
}

button{
    padding:14px 30px;
    border:none;
    border-radius:50px;
    cursor:pointer;
    font-size:16px;
    background:#3b82f6;
    color:white;
}

button:hover{
    background:#2563eb;
}

.chat{
    margin-top:25px;
    background:#334155;
    border-radius:12px;
    padding:15px;
    min-height:80px;
    text-align:left;
}
</style>
</head>

<body>

<div class="container">

<h1>My Voice Agent</h1>

<div class="status" id="status">
🟢 Ready
</div>

<div class="orb"></div>

<div class="wave">
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
</div>

<button onclick="toggleListening()">
🎤 Talk
</button>

<div class="chat" id="chat">
Hello! Press the microphone to begin.
</div>

</div>

<script>
let listening=false;

function toggleListening(){

const status=document.getElementById("status");
const chat=document.getElementById("chat");

listening=!listening;

if(listening){
status.innerHTML="🎙️ Listening...";
chat.innerHTML="I'm listening...";
}else{
status.innerHTML="🟢 Ready";
chat.innerHTML="Conversation finished.";
}

}
</script>

</body>
